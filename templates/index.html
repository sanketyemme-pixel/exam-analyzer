<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Performance Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease;
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }

        .grade-box {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
        }

        .records-section {
            grid-column: 1 / -1;
            margin-top: 20px;
        }

        .records-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .records-table thead {
            background: #667eea;
            color: white;
        }

        .records-table th,
        .records-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .records-table tbody tr:hover {
            background: #f5f5f5;
        }

        .percentage {
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
        }

        .percentage.high {
            background: #4caf50;
        }

        .percentage.medium {
            background: #ff9800;
        }

        .percentage.low {
            background: #f44336;
        }

        .delete-btn {
            background: #f44336;
            padding: 6px 12px;
            font-size: 0.85em;
            width: auto;
            margin: 0;
        }

        .delete-btn:hover {
            background: #d32f2f;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            animation: slideIn 0.4s ease;
        }

        .message.success {
            background: #4caf50;
            color: white;
        }

        .message.error {
            background: #f44336;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 2em;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Exam Performance Analyzer</h1>
            <p>Track Your Academic Progress</p>
        </header>

        <div class="main-grid">
            <!-- Add Exam Card -->
            <div class="card">
                <h2>➕ Add New Exam</h2>
                <div id="message"></div>
                <div class="form-group">
                    <label>Subject Name</label>
                    <input type="text" id="subject" placeholder="e.g., Mathematics, Science">
                </div>
                <div class="form-group">
                    <label>Marks Obtained</label>
                    <input type="number" id="marks" placeholder="e.g., 85" step="0.1">
                </div>
                <div class="form-group">
                    <label>Total Marks</label>
                    <input type="number" id="totalMarks" placeholder="e.g., 100" step="0.1">
                </div>
                <button onclick="addExam()">Add Exam</button>
            </div>

            <!-- Statistics Card -->
            <div class="card">
                <h2>📊 Your Statistics</h2>
                <div id="statsContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No records yet. Add an exam to see statistics!</p>
                    </div>
                </div>
            </div>

            <!-- Records Card -->
            <div class="card" style="grid-column: 1 / -1;">
                <h2>📋 All Exam Records</h2>
                <div id="recordsContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No exam records found. Start by adding your first exam!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load records on page load
        window.addEventListener('load', loadRecords);
        window.addEventListener('load', loadStatistics);

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.innerHTML = '';
                messageDiv.className = '';
            }, 3000);
        }

        function addExam() {
            const subject = document.getElementById('subject').value;
            const marks = document.getElementById('marks').value;
            const totalMarks = document.getElementById('totalMarks').value;

            if (!subject || !marks || !totalMarks) {
                showMessage('⚠️ Please fill all fields!', 'error');
                return;
            }

            fetch('/api/add-exam', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    subject: subject,
                    marks: marks,
                    total_marks: totalMarks
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMessage('✓ ' + data.message, 'success');
                    document.getElementById('subject').value = '';
                    document.getElementById('marks').value = '';
                    document.getElementById('totalMarks').value = '';
                    loadRecords();
                    loadStatistics();
                } else {
                    showMessage('✗ ' + data.message, 'error');
                }
            });
        }

        function loadRecords() {
            fetch('/api/get-records')
            .then(response => response.json())
            .then(data => {
                const recordsContent = document.getElementById('recordsContent');
                
                if (data.length === 0) {
                    recordsContent.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>No exam records found. Start by adding your first exam!</p>
                        </div>
                    `;
                    return;
                }

                let html = `
                    <table class="records-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Subject</th>
                                <th>Marks</th>
                                <th>Total</th>
                                <th>Percentage</th>
                                <th>Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                data.forEach((record, index) => {
                    let percentageClass = 'low';
                    if (record.percentage >= 70) percentageClass = 'high';
                    else if (record.percentage >= 60) percentageClass = 'medium';

                    html += `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${record.subject}</td>
                            <td>${record.marks}</td>
                            <td>${record.total_marks}</td>
                            <td><span class="percentage ${percentageClass}">${record.percentage}%</span></td>
                            <td>${record.date}</td>
                            <td><button class="delete-btn" onclick="deleteRecord(${index})">Delete</button></td>
                        </tr>
                    `;
                });

                html += `
                        </tbody>
                    </table>
                `;

                recordsContent.innerHTML = html;
            });
        }

        function loadStatistics() {
            fetch('/api/get-statistics')
            .then(response => response.json())
            .then(data => {
                const statsContent = document.getElementById('statsContent');
                
                if (!data.success) {
                    statsContent.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>No statistics available yet!</p>
                        </div>
                    `;
                    return;
                }

                statsContent.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-label">Total Exams</div>
                            <div class="stat-value">${data.total_exams}</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Average Score</div>
                            <div class="stat-value">${data.average}%</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Highest Score</div>
                            <div class="stat-value">${data.highest}%</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Lowest Score</div>
                            <div class="stat-value">${data.lowest}%</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Best Subject</div>
                            <div class="stat-value">${data.best_subject}</div>
                            <div class="stat-label">(${data.best_percentage}%)</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Weakest Subject</div>
                            <div class="stat-value">${data.worst_subject}</div>
                            <div class="stat-label">(${data.worst_percentage}%)</div>
                        </div>
                        <div class="grade-box">
                            Overall Grade: <strong>${data.grade}</strong>
                        </div>
                    </div>
                `;
            });
        }

        function deleteRecord(index) {
            if (confirm('Are you sure you want to delete this record?')) {
                fetch(`/api/delete-record/${index}`, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        loadRecords();
                        loadStatistics();
                        showMessage('✓ Record deleted!', 'success');
                    }
                });
            }
        }
    </script>
</body>
</html>
